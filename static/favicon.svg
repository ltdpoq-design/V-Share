<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="55%" stop-color="#ff00ea"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <linearGradient id="vfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8d8ff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect x="2" y="2" width="60" height="60" rx="15" ry="15" fill="url(#bg)"/>
  <!-- 左上高光（提升二次元可爱感） -->
  <path d="M 2 17 Q 2 2 17 2 L 35 2 Q 20 14 10 30 Z" fill="url(#shine)"/>
  <!-- V 字母（粗体主元素） -->
  <path d="M 13 14 L 22 14 L 32 38 L 42 14 L 51 14 L 35 51 L 29 51 Z"
        fill="url(#vfill)"
        stroke="white" stroke-width="1" stroke-opacity="0.4"
        stroke-linejoin="round"/>
  <!-- 装饰圆点 -->
  <circle cx="13" cy="13" r="1.6" fill="white" opacity="0.9"/>
  <circle cx="51" cy="13" r="1.6" fill="white" opacity="0.9"/>
  <circle cx="51" cy="51" r="1.6" fill="white" opacity="0.5"/>
</svg>
