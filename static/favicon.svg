<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#ff00ea"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <linearGradient id="v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e0ff" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14"
        fill="url(#bg)"/>

  <!-- 装饰圆点（科技感） -->
  <circle cx="12" cy="12" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="52" cy="12" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="12" cy="52" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="52" cy="52" r="1.5" fill="white" opacity="0.6"/>

  <!-- V 字母（主元素） -->
  <g filter="url(#glow)">
    <path d="M 16 16 L 22 16 L 32 36 L 42 16 L 48 16 L 34 44 L 30 44 Z"
          fill="url(#v)" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
  </g>

  <!-- V 下方小标签 share（半透明胶囊底，凸显 share 字样） -->
  <rect x="15" y="48" width="34" height="11" rx="5.5" ry="5.5"
        fill="#000000" fill-opacity="0.28"
        stroke="white" stroke-opacity="0.4" stroke-width="0.6"/>
  <text x="32" y="56.2" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="6.5" font-weight="700" letter-spacing="0.2"
        fill="white" text-anchor="middle">share</text>
</svg>
