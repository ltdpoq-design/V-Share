<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#00d4ff">
<meta name="description" content="V Share - 无任何隐私的人人可用的多设备内容便捷分享器">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Favicon (v3.0.0: 单一 SVG, 多尺寸自适应) -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/static/site.webmanifest">

<!-- i18n engine (v3.0.0: 必须早于 DOMContentLoaded 加载) -->
<script src="/static/i18n.js"></script>

<title>V Share - 无任何隐私的人人可用的多设备内容便捷分享器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --primary: #00d4ff;
    --secondary: #ff00ea;
    --accent: #00ff88;
    --bg: #050514;
    --surface: rgba(20, 20, 50, 0.6);
    --text: #e0e0ff;
    --border: rgba(0, 212, 255, 0.3);
}
html, body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}
body {
    background:
        radial-gradient(ellipse at 20% 30%, rgba(0, 212, 255, 0.15), transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(255, 0, 234, 0.15), transparent 50%),
        var(--bg);
    background-attachment: fixed;
}

/* === 背景动效：网格 + 粒子 + 扫描线 === */
.grid-bg {
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(0, 212, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.08) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 15s linear infinite;
    pointer-events: none;
    z-index: 0;
}
@keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 50px 50px; }
}
.particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}
.particle {
    position: absolute;
    background: var(--primary);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--primary), 0 0 15px var(--primary);
    animation: floatUp linear infinite;
    opacity: 0.6;
}
.particle:nth-child(3n) {
    background: var(--secondary);
    box-shadow: 0 0 8px var(--secondary), 0 0 15px var(--secondary);
    animation-duration: 12s;
}
.particle:nth-child(5n) {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 15px var(--accent);
    animation-duration: 9s;
}
@keyframes floatUp {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
}
/* 顶部扫描线 */
.scan-line {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    box-shadow: 0 0 10px var(--primary);
    z-index: 5;
    animation: scanMove 4s linear infinite;
    pointer-events: none;
}
@keyframes scanMove {
    0% { top: 0; opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
}

/* === 主体两栏布局 === */
.layout {
    position: relative;
    z-index: 10;
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
}
.main-col { min-width: 0; }
.side-col {
    min-width: 0;
    position: sticky;
    top: 20px;
    align-self: start;
    max-height: calc(100vh - 40px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
/* v3.0.0: 语言切换器 */
.lang-switcher-wrap {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
}
.lang-switcher {
    width: auto !important;
    padding: 6px 14px !important;
    background: rgba(0, 0, 0, 0.4) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    color: var(--text) !important;
    font-size: 0.8em !important;
    font-family: inherit !important;
    cursor: pointer !important;
    appearance: none !important;
    -webkit-appearance: none !important;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%2300d4ff' d='M5 6L0 0h10z'/></svg>") !important;
    background-repeat: no-repeat !important;
    background-position: right 10px center !important;
    padding-right: 28px !important;
    transition: all 0.3s !important;
}
.lang-switcher:hover {
    border-color: var(--primary) !important;
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.3) !important;
}
.lang-switcher:focus {
    outline: none;
    border-color: var(--primary) !important;
}
.lang-switcher option {
    background: #0a0a20;
    color: var(--text);
}
.logo {
    text-align: center;
    font-size: 2.4em;
    font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    letter-spacing: 3px;
    animation: logoGradient 6s ease infinite;
    text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
}
@keyframes logoGradient {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}
.subtitle {
    text-align: center;
    font-size: 0.85em;
    color: var(--text);
    opacity: 0.7;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-weight: 500;
    animation: subtitleGlow 3s ease-in-out infinite;
}
.subtitle-en {
    text-align: center;
    font-size: 0.7em;
    opacity: 0.4;
    letter-spacing: 4px;
    margin-bottom: 30px;
    animation: subtitleGlow 3s ease-in-out infinite;
    font-family: 'SF Mono', Monaco, monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
}
.subtitle-en .device-badge {
    margin-left: 0;
}
@keyframes subtitleGlow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
}
/* 设备自适应标识 */
.device-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    margin-left: 8px;
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.55em;
    opacity: 0.7;
    vertical-align: middle;
}

/* Tabs */
.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    position: relative;
}
.tab {
    flex: 1;
    padding: 14px;
    background: rgba(20, 20, 50, 0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.tab::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
    transition: left 0.5s;
}
.tab:hover { border-color: var(--primary); transform: translateY(-2px); }
.tab:hover::before { left: 100%; }
.tab.active {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(255, 0, 234, 0.2));
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.1);
}

/* Card */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    backdrop-filter: blur(20px);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
}
.card::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(45deg, transparent, var(--primary), transparent, var(--secondary), transparent);
    background-size: 400% 400%;
    border-radius: 18px;
    z-index: -1;
    opacity: 0;
    animation: borderGlow 8s linear infinite;
    transition: opacity 0.3s;
}
.card:hover::before { opacity: 0.5; }
@keyframes borderGlow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}
.card-title {
    color: var(--primary);
    margin-bottom: 16px;
    font-size: 1.1em;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.close-btn {
    width: 28px;
    height: 28px;
    background: rgba(255, 50, 50, 0.1);
    border: 1px solid rgba(255, 50, 50, 0.3);
    border-radius: 50%;
    color: #ff8080;
    font-size: 1.2em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
    padding: 0;
}
.close-btn:hover {
    background: rgba(255, 50, 50, 0.3);
    box-shadow: 0 0 15px rgba(255, 50, 50, 0.5);
    transform: rotate(90deg);
}
.side-col.closed {
    display: none;
}
.fab-show-list {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 16px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    border-radius: 30px;
    font-weight: 700;
    cursor: pointer;
    z-index: 50;
    box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
    font-size: 0.9em;
}
.fab-show-list.show { display: inline-flex; align-items: center; gap: 6px; }
.fab-show-list:hover { transform: scale(1.05); }

/* 阅后即焚 */
.burn-label {
    display: flex !important;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 12px 14px;
    background: rgba(255, 100, 0, 0.05);
    border: 1px solid rgba(255, 100, 0, 0.3);
    border-radius: 10px;
    transition: all 0.2s;
    margin-bottom: 0 !important;
}
.burn-label:hover {
    background: rgba(255, 100, 0, 0.1);
    border-color: rgba(255, 100, 0, 0.6);
}
.burn-checkbox {
    width: 18px !important;
    height: 18px;
    padding: 0;
    cursor: pointer;
    accent-color: #ff6400;
    flex-shrink: 0;
}
.burn-text {
    color: #ff8800;
    font-weight: 700;
    font-size: 0.95em;
    flex-shrink: 0;
}
.burn-hint {
    color: var(--text);
    opacity: 0.6;
    font-size: 0.78em;
    font-weight: 400;
    flex: 1;
}
.burned-tag {
    display: inline-block;
    padding: 2px 8px;
    background: linear-gradient(135deg, rgba(255, 100, 0, 0.3), rgba(255, 0, 0, 0.3));
    border: 1px solid #ff6400;
    border-radius: 12px;
    color: #ff8800;
    font-size: 0.72em;
    font-weight: 700;
    animation: firePulse 1.2s ease-in-out infinite;
}
@keyframes firePulse {
    0%, 100% { box-shadow: 0 0 5px rgba(255, 100, 0, 0.4); }
    50% { box-shadow: 0 0 15px rgba(255, 100, 0, 0.8); }
}
.device-tag {
    display: inline-block;
    padding: 1px 6px;
    background: rgba(0, 212, 255, 0.15);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.7em;
    color: var(--primary);
    margin-left: 4px;
    font-weight: 600;
    vertical-align: middle;
}

/* 版本条 */
.version-bar {
    text-align: center;
    padding: 20px 20px 12px;
    margin-top: 16px;
    color: var(--text);
    opacity: 0.7;
    font-family: 'SF Mono', Monaco, monospace;
    line-height: 1.6;
    position: relative;
}
.version-bar::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
}
.version-line-main {
    font-size: 0.85em;
    animation: versionGlow 4s ease-in-out infinite;
}
.version-line-sub {
    font-size: 0.7em;
    opacity: 0.7;
    margin-top: 4px;
    letter-spacing: 0.5px;
}
.version-line-future {
    font-size: 0.72em;
    font-style: italic;
    margin-top: 8px;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200% 200%;
    animation: futureGradient 8s linear infinite;
    letter-spacing: 1px;
}
@keyframes futureGradient {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}
@keyframes versionGlow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
}
.version-bar strong {
    color: var(--primary);
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.field { margin-bottom: 20px; }
label {
    display: block;
    margin-bottom: 10px;
    color: var(--primary);
    font-size: 0.95em;
    font-weight: 600;
}
textarea, input[type=text], select {
    width: 100%;
    padding: 16px 18px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1em;
    font-family: inherit;
    transition: all 0.3s;
    cursor: pointer;
}
textarea {
    min-height: 160px;
    font-family: 'SF Mono', Monaco, monospace;
    cursor: text;
    resize: vertical;
    line-height: 1.5;
}
textarea:focus, input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 10px rgba(0, 212, 255, 0.1);
    background: rgba(0, 0, 0, 0.6);
}
select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%2300d4ff' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 18px center;
    padding-right: 45px;
}
.file-drop {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 50px 20px;
    text-align: center;
    transition: all 0.3s;
    cursor: pointer;
    background: rgba(0, 212, 255, 0.03);
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}
.file-drop::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(from 0deg, transparent, var(--primary), transparent 30%);
    animation: rotateBorder 4s linear infinite;
    opacity: 0;
    transition: opacity 0.3s;
}
.file-drop:hover { border-color: var(--primary); background: rgba(0, 212, 255, 0.08); }
.file-drop:hover::after { opacity: 0.15; }
.file-drop.drag-over { border-color: var(--accent); background: rgba(0, 255, 136, 0.1); transform: scale(1.02); }
@keyframes rotateBorder {
    100% { transform: rotate(360deg); }
}
.file-icon { font-size: 3.5em; margin-bottom: 12px; z-index: 1; }
.file-info {
    margin-top: 14px;
    padding: 14px;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 8px;
    font-size: 0.9em;
    width: 100%;
    z-index: 1;
    position: relative;
}
.btn {
    display: inline-block;
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 1em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    text-decoration: none;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.btn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -100%;
    width: 50%;
    height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
}
.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5), 0 0 40px rgba(0, 212, 255, 0.3);
}
.btn:hover::after { left: 100%; }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-full { width: 100%; display: block; }
.btn-copy {
    padding: 6px 12px;
    background: var(--accent);
    color: black;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85em;
    transition: all 0.2s;
}
.btn-copy:hover { box-shadow: 0 0 15px rgba(0, 255, 136, 0.6); transform: scale(1.05); }
.btn-go {
    padding: 6px 12px;
    background: var(--primary);
    color: black;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85em;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
}
.btn-go:hover { box-shadow: 0 0 15px rgba(0, 212, 255, 0.6); transform: scale(1.05); }
.share-link-box {
    display: flex;
    gap: 8px;
    padding: 14px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid var(--accent);
    border-radius: 10px;
    margin-top: 16px;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    animation: resultAppear 0.5s ease-out;
}
@keyframes resultAppear {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.share-link-box input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 0.9em;
    padding: 8px;
}
.countdown {
    display: inline-block;
    padding: 6px 14px;
    background: rgba(0, 255, 136, 0.15);
    border: 1px solid var(--accent);
    border-radius: 20px;
    color: var(--accent);
    font-family: 'SF Mono', monospace;
    font-size: 0.9em;
    animation: pulse 2s ease-in-out infinite;
}
.countdown.short {
    background: rgba(255, 165, 0, 0.15);
    border-color: orange;
    color: orange;
    animation-duration: 0.8s;
}
@keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
    50% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
}
.expired-tag {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(255, 50, 50, 0.15);
    border: 1px solid #ff3232;
    border-radius: 20px;
    color: #ff8080;
    font-size: 0.85em;
    animation: warningPulse 1.5s ease-in-out infinite;
}
@keyframes warningPulse {
    0%, 100% { box-shadow: 0 0 5px rgba(255, 50, 50, 0.3); }
    50% { box-shadow: 0 0 15px rgba(255, 50, 50, 0.6); }
}

/* 侧边栏列表 */
.side-list {
    overflow-y: auto;
    padding-right: 4px;
    flex: 1;
    max-height: calc(100vh - 180px);
}
.side-list::-webkit-scrollbar { width: 4px; }
.side-list::-webkit-scrollbar-track { background: rgba(0, 212, 255, 0.05); }
.side-list::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--primary), var(--secondary)); border-radius: 2px; }
/* 多行直接显示区（无滚动也能看 5-6 条） */
.list-item {
    padding: 12px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: all 0.3s;
    animation: listItemIn 0.4s ease-out backwards;
}
.partial-shown {
    background: linear-gradient(90deg, rgba(0, 212, 255, 0.15), transparent);
    padding: 1px 4px;
    border-radius: 4px;
    font-family: 'SF Mono', monospace;
}
@keyframes listItemIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}
.list-item:hover { border-color: var(--primary); transform: translateX(2px); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
.list-item-info { min-width: 0; }
.list-item-title {
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 4px;
    word-break: break-all;
    font-size: 0.85em;
    display: flex;
    align-items: center;
    gap: 6px;
}
.list-item-meta {
    font-size: 0.72em;
    opacity: 0.7;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 4px;
}
.list-item-actions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
}

.btn-disabled {

    color: #ff8080;
    background: rgba(255, 50, 50, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
}

/* 底部存储条 */
.footer {
    position: relative;
    z-index: 10;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 30px;
}
.storage-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 24px;
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
    animation: storageCardPulse 4s ease-in-out infinite;
}
@keyframes storageCardPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.1); }
    50% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); }
}
.storage-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), var(--accent), transparent);
    animation: storageScan 3s linear infinite;
}
.storage-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top right, rgba(0, 212, 255, 0.1), transparent 60%);
    pointer-events: none;
}
@keyframes storageScan {
    0% { left: -100%; }
    100% { left: 100%; }
}
.storage-icon {
    font-size: 2.5em;
    filter: drop-shadow(0 0 8px var(--primary));
    animation: storageIconSpin 8s linear infinite;
    z-index: 1;
}
@keyframes storageIconSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.storage-info {
    flex: 1;
    min-width: 200px;
    z-index: 1;
}
.storage-label {
    font-size: 0.85em;
    color: var(--primary);
    font-weight: 600;
    white-space: nowrap;
    margin-bottom: 8px;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
}
.storage-bar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
}
.storage-track {
    flex: 1;
    height: 12px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
}
.storage-track::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg,
        transparent 0%,
        rgba(0, 212, 255, 0.1) 25%,
        rgba(255, 0, 234, 0.1) 50%,
        rgba(0, 255, 136, 0.1) 75%,
        transparent 100%
    );
    background-size: 200% 100%;
    animation: trackShimmer 3s linear infinite;
}
@keyframes trackShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
.storage-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    background-size: 200% 100%;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 15px var(--accent), inset 0 0 10px rgba(255, 255, 255, 0.3);
    position: relative;
    animation: fillColorShift 6s linear infinite;
}
@keyframes fillColorShift {
    0% { background-position: 0% 0; }
    100% { background-position: 200% 0; }
}
.storage-fill::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 30px;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
    animation: fillShimmer 1.2s ease-in-out infinite;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
}
@keyframes fillShimmer {
    0%, 100% { opacity: 0.3; transform: translateX(-10px); }
    50% { opacity: 1; transform: translateX(0); }
}
.storage-text {
    font-size: 0.9em;
    color: var(--accent);
    font-family: 'SF Mono', monospace;
    white-space: nowrap;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    font-weight: 600;
    min-width: 180px;
    text-align: right;
}
.storage-num {
    display: inline-block;
    min-width: 50px;
    text-align: right;
    transition: all 0.3s;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
    font-size: 1.1em;
}

/* 浮动跳转按钮 - JS 控制显示，CSS 兜底（Safari 兼容） */
.fab-jump {
    display: none;
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom, 20px));
    right: max(20px, env(safe-area-inset-right, 20px));
    padding: 12px 18px 12px 18px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    border-radius: 30px;
    font-weight: 700;
    cursor: pointer;
    z-index: 9999;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
    animation: fabBounce 2s ease-in-out infinite;
    font-size: 0.9em;
    align-items: center;
    gap: 6px;
    /* Safari 兼容 */
    -webkit-tap-highlight-color: transparent;
    visibility: visible;
    opacity: 1;
    /* 触摸目标最小 44pt (iOS HIG) */
    min-height: 44px;
    -webkit-touch-callout: none;
    user-select: none;
}
.fab-jump.show-mobile {
    display: inline-flex !important;
    visibility: visible !important;
    opacity: 1 !important;
}
.fab-jump .fab-content {
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.fab-jump .fab-close {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    margin-left: 4px;
    background: rgba(255, 50, 50, 0.25);
    border: 1px solid rgba(255, 80, 80, 0.5);
    border-radius: 50%;
    color: #ff8080;
    font-size: 1.1em;
    font-weight: 900;
    line-height: 1;
    cursor: pointer;
    transition: all 0.2s;
}
.fab-jump .fab-close:hover {
    background: rgba(255, 50, 50, 0.5);
    box-shadow: 0 0 10px rgba(255, 50, 50, 0.6);
    transform: rotate(90deg);
}
.fab-jump.hidden { display: none !important; }
@keyframes fabBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}
.fab-jump:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 30px rgba(0, 212, 255, 0.7);
}
.fab-jump .badge {
    display: inline-block;
    margin-left: 6px;
    padding: 2px 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    font-size: 0.8em;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 14px 24px;
    background: rgba(20, 20, 50, 0.95);

.toast.show {

    opacity: 1;
}
.toast.error { border-color: #ff3232; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 50, 50, 0.5); }

@media (max-width: 900px) {

}
</style>

<script>
// === 设备检测 ===
let currentDevice = 'unknown';
function detectDevice() {
    const w = window.innerWidth;
    let device, icon;
    if (w < 600) { device = '手机'; icon = '📱'; }
    else if (w < 1024) { device = '平板'; icon = '📱'; }
    else { device = 'PC'; icon = '💻'; }
    currentDevice = device;
    const badge = document.getElementById('device-badge');
    if (badge) badge.textContent = icon + ' ' + device;
    // 同时控制 fab-jump 显示（Safari 兼容：不用 media query）
    updateFabJump(w);
    return { device, width: w };
}

// 根据宽度控制 fab-jump 显示（Safari 兼容）
function updateFabJump(width) {
    const fab = document.getElementById('fab-jump');
    if (!fab) return;
    // 如果用户明确关闭了，不显示
    if (localStorage.getItem('fab-jump-closed') === '1' && width <= 900) {
        fab.classList.remove('show-mobile');
        fab.classList.add('hidden');
    } else {
        fab.classList.remove('hidden');
        if (width <= 900) {
            fab.classList.add('show-mobile');
        } else {
            fab.classList.remove('show-mobile');
        }
        // PC 端清除关闭状态
        if (width > 900) {
            localStorage.removeItem('fab-jump-closed');
        }
    }
}

window.addEventListener('resize', detectDevice);
detectDevice();

// 设备名 → 短标签
function deviceShort(d) {
    if (d === '手机') return '📱手机';
    if (d === '平板') return '📱平板';
    if (d === 'PC') return '💻PC';
    return '❓';
}

// === 粒子动效 ===
(function() {
    const particles = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
        p.style.animationDelay = Math.random() * 15 + 's';
        p.style.animationDuration = (Math.random() * 8 + 8) + 's';
        particles.appendChild(p);
    }
})();

// === 转义函数 ===
function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
}
function escapeJs(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
}

// === Toast ===
function toast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type === 'error' ? 'error' : '');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function copyToClipboard(text) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(
            () => toast(i18nT('toast.copied', '✓ 已复制到剪贴板')),
            () => fallbackCopy(text)
        );
    } else {
        fallbackCopy(text);
    }
}
function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast(i18nT('toast.copied', '✓ 已复制')); }
    catch(e) { toast(i18nT('toast.copy_failed', '复制失败'), 'error'); }
    document.body.removeChild(ta);
}

// === 浮窗：跳到最近分享 ===
function jumpToList() {
    const el = document.getElementById('side-col');
    if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // 高亮效果
        const card = el.querySelector('.card');
        if (card) {
            card.style.transition = 'box-shadow 0.5s';
            card.style.boxShadow = '0 0 40px rgba(0, 255, 136, 0.6)';
            setTimeout(() => { card.style.boxShadow = ''; }, 1500);
        }
    }
}
// X 关闭浮窗（不跳转）
document.getElementById('fab-close').onclick = (e) => {
    e.stopPropagation();
    document.getElementById('fab-jump').classList.add('hidden');
    localStorage.setItem('fab-jump-closed', '1');
};
// 关闭状态由 updateFabJump 处理

// === Tab 切换 ===
document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('[id^="panel-"]').forEach(p => p.style.display = 'none');
        document.getElementById('panel-' + tab.dataset.tab).style.display = '';

// === 文件选择 ===
const fileDrop = document.getElementById('file-drop');
const fileInput = document.getElementById('file-input');
const fileInfo = document.getElementById('file-info');
const fileSubmit = document.getElementById('file-submit');

fileDrop.onclick = () => fileInput.click();
fileDrop.ondragover = e => { e.preventDefault(); fileDrop.classList.add('drag-over'); };
fileDrop.ondragleave = () => fileDrop.classList.remove('drag-over');
fileDrop.ondrop = e => {
    e.preventDefault();
    fileDrop.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
};
fileInput.onchange = e => { if (e.target.files[0]) handleFile(e.target.files[0]); };

let currentFile = null;
function handleFile(f) {
    if (f.size > 100 * 1024 * 1024) {
        toast(i18nT('toast.file_too_big', '文件超过 100 MB'), 'error');
        return;
    }
    currentFile = f;
    fileInfo.style.display = '';
    fileInfo.innerHTML = `
        <strong>📎 ${escapeHtml(f.name)}</strong><br>
        ${i18nT('file.size_label', '大小:')} ${(f.size / 1024 / 1024).toFixed(2)} MB<br>
        ${i18nT('file.type_label', '类型:')} ${f.type || 'application/octet-stream'}
    `;
    fileSubmit.disabled = false;
}

// === 提交 ===
async function submitText() {
    const text = document.getElementById('text-input').value.trim();
    if (!text) { toast(i18nT('toast.empty_text', '请输入内容'), 'error'); return; }
    const expire = document.getElementById('text-expire').value;
    const burn = document.getElementById('text-burn').checked;
    if (burn) {
        if (!confirm(i18nT('burn.confirm_body_text', '⚠️ 阅后即焚确认\n\n第一个看到这条消息的人阅读后，消息将立即变为「已焚」状态。\n\n原过期时间后 30 天彻底删除。\n\n是否继续？'))) return;
    }
    const fd = new FormData();
    fd.append('text', text);
    fd.append('expire', expire);
    fd.append('device', currentDevice);
    if (burn) fd.append('burn_after_read', '1');
    await submitShare(fd);
}

async function submitUrl() {
    let url = document.getElementById('url-input').value.trim();
    if (!url) { toast(i18nT('toast.empty_url', '请输入网址'), 'error'); return; }
    // 自动补全 http://（网址表单：无协议就补，恢复豆要的自动补足）
    if (!url.match(/^[a-z][a-z0-9+.-]*:\/\//i)) {
        if (/\s/.test(url)) {
            toast(i18nT('toast.url_no_space', '网址不能包含空格'), 'error');
            return;
        }
        url = 'http://' + url;
    }
    // 大小写归一化常见协议头
    url = url.replace(/^http:\/\//i, 'http://').replace(/^https:\/\//i, 'https://');
    const expire = document.getElementById('url-expire').value;
    const burn = document.getElementById('url-burn').checked;
    if (burn) {
        if (!confirm(i18nT('burn.confirm_body_url', '⚠️ 阅后即焚确认\n\n第一个打开此网址的人阅读后，消息将立即变为「已焚」状态。\n\n原过期时间后 30 天彻底删除。\n\n是否继续？'))) return;
    }
    const fd = new FormData();
    fd.append('text', url);
    fd.append('expire', expire);
    fd.append('device', currentDevice);
    if (burn) fd.append('burn_after_read', '1');
    await submitShare(fd);
}

async function submitFile() {
    if (!currentFile) { toast(i18nT('toast.empty_file', '请选择文件'), 'error'); return; }
    const expire = document.getElementById('file-expire').value;
    const burn = document.getElementById('file-burn').checked;
    if (burn) {
        if (!confirm(i18nT('burn.confirm_body_file', '⚠️ 阅后即焚确认\n\n第一个下载此文件的人阅读后，文件将立即变为「已焚」状态。\n\n原过期时间后 30 天彻底删除。\n\n是否继续？'))) return;
    }
    const fd = new FormData();
    fd.append('file', currentFile);
    fd.append('expire', expire);
    fd.append('device', currentDevice);
    if (burn) fd.append('burn_after_read', '1');
    await submitShare(fd);
}

async function submitShare(fd) {
    try {
        const resp = await fetch('/api/share', { method: 'POST', body: fd });
        const data = await resp.json();
        if (!resp.ok) {
            toast(data.message || i18nT('error.empty', '创建失败'), 'error');
            return;
        }
        showResult(data);
        loadShares();
        loadStats();
        toast(i18nT('toast.created', '✓ 创建成功，3 秒后清空表单...'));
        // 3 秒后清空表单 + 滚动到结果 + 5 秒后清空
        setTimeout(() => {
            // 清空当前面板的输入
            const activePanel = document.querySelector('[id^="panel-"]:not([style*="display: none"])');
            if (activePanel) {
                const textarea = activePanel.querySelector('textarea');
                const input = activePanel.querySelector('input[type="text"]');
                const checkbox = activePanel.querySelector('input[type="checkbox"]');
                if (textarea) textarea.value = '';
                if (input) input.value = '';
                if (checkbox) checkbox.checked = false;
                // 文件重置
                if (activePanel.id === 'panel-file') {
                    currentFile = null;
                    fileInfo.style.display = 'none';
                    fileInfo.innerHTML = '';
                    fileSubmit.disabled = true;
                    fileInput.value = '';
                }
            }
            toast(i18nT('result.cleared_toast', '✓ 表单已清空'));
        }, 3000);
    } catch (e) {
        toast(i18nT('toast.network_error', '网络错误: ') + e.message, 'error');
    }
}

function showResult(data) {
    const result = document.getElementById('result-area');
    const url = data.url;
    result.innerHTML = `
        <div class="card" style="border-color: var(--accent);">
            <h3 style="color: var(--accent); margin-bottom: 12px;">${i18nT('result.title', '✓ 分享已创建')}</h3>
            <div class="share-link-box">
                <input type="text" value="${escapeHtml(url)}" readonly id="link-${data.id}">
                <button class="btn-copy" data-copy="${escapeHtml(url)}">${i18nT('result.copy', '复制')}</button>
            </div>
            <div style="text-align: center; margin-top: 16px;">
                <span class="countdown" id="cd-${data.id}" data-expires="${data.expires_at}">
                    ${i18nT('result.countdown_prefix', '剩余: ')}${formatTime(data.expires_in)}
                </span>
            </div>
        </div>
    `;
    // 绑定复制按钮
    const copyBtn = result.querySelector('.btn-copy');
    if (copyBtn) {
        copyBtn.onclick = () => copyToClipboard(copyBtn.getAttribute('data-copy'));
    }
    updateCountdowns();
}

function formatTime(seconds) {
    if (seconds < 0) seconds = 0;
    if (seconds < 60) return seconds + ' 秒';
    if (seconds < 600) {
        // 剩 10 分钟内显示秒（动态倒计时）
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m + ' 分 ' + s + ' 秒';
    }
    if (seconds < 3600) return Math.floor(seconds / 60) + ' 分钟';
    if (seconds < 86400) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        return h + ' 时 ' + m + ' 分';
    }
    return Math.floor(seconds / 86400) + ' 天';
}

function updateCountdowns() {
    document.querySelectorAll('.countdown').forEach(el => {
        const exp = parseInt(el.dataset.expires);
        const diff = exp - Math.floor(Date.now() / 1000);
        if (diff <= 0) {
            el.outerHTML = '<span class="expired-tag">⏰ 已过期</span>';
        } else {
            el.textContent = '剩余: ' + formatTime(diff);
            el.classList.toggle('short', diff < 600);
        }
    });
    document.querySelectorAll('.list-countdown').forEach(el => {
        const exp = parseInt(el.dataset.expires);
        const diff = exp - Math.floor(Date.now() / 1000);
        if (diff <= 0) {
            el.outerHTML = '<span class="expired-tag">已过期</span>';
        } else {
            el.textContent = '剩 ' + formatTime(diff);
            el.classList.toggle('short', diff < 600);
        }
    });
}

// === 列表 - 侧边栏 ===
async function loadShares() {
    try {
        const resp = await fetch('/api/list');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!Array.isArray(data)) throw new Error('Invalid response');
        const container = document.getElementById('shares-list');
        if (data.length === 0) {
            container.innerHTML = '<p style="opacity:0.5; text-align:center; padding:20px; font-size: 0.9em;">' + i18nT('sidebar.empty', '还没有分享') + '</p>';
            updateFabCount(0);
            return;
        }
        const now = Math.floor(Date.now() / 1000);
        const html = data.map((s, i) => {
            const isExpired = s.status && s.status !== 'active';
            const isBurned = s.status === 'burned';
            // 阅后即焚 + 未过期 + 未焚 = 阅后即焚（首 2 字可见，已焚显示 ***）
            const isBurnAfterRead = s.burn_after_read && !isBurned && !isExpired;
            const icon = s.type === 'url' ? '🔗' : s.type === 'file' ? '📎' : '📝';
            // 预览：后端已经处理打码（未读阅后即焚首 2 字 + *；已焚/过期全 *）
            let preview;
            if (s.type === 'file') {
                preview = s.file_name || '(文件)';
            } else {
                preview = s.content || '';
            }
            // 判定是否需要 partial-shown 样式（首 2 字可见）
            const isPartial = isBurnAfterRead && preview.length > 2;
            const isFullMask = isBurned || isExpired;
            if (preview.length > 30) preview = preview.slice(0, 30) + '...';
            // 复制按钮
            let copyContent = '';
            if (!isExpired && !isBurned) {
                if (s.type === 'file') {
                    copyContent = 'https://share.vivi.homes/s/' + s.id;
                } else {
                    copyContent = s.content || ('https://share.vivi.homes/s/' + s.id);
                }
            }
            const url = 'https://share.vivi.homes/s/' + s.id;
            const dt = new Date(s.created_at * 1000);
            const dateStr = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
            // 已阅读时间
            let viewedInfo = '';
            if (s.first_viewed_at) {
                const vd = new Date(s.first_viewed_at * 1000);
                viewedInfo = `<span class="viewed-info">${i18nT('list.viewed_prefix', '👁 已读于 ')}${vd.getMonth()+1}/${vd.getDate()} ${String(vd.getHours()).padStart(2,'0')}:${String(vd.getMinutes()).padStart(2,'0')}</span>`;
            }
            // 已焚时间
            let burnedInfo = '';
            if (s.burned_at) {
                const bd = new Date(s.burned_at * 1000);
                burnedInfo = `<span class="burned-info">${i18nT('list.burned_prefix', '🔥 焚于 ')}${bd.getMonth()+1}/${bd.getDate()} ${String(bd.getHours()).padStart(2,'0')}:${String(bd.getMinutes()).padStart(2,'0')}</span>`;
            }
            // 设备标签
            const devTag = s.device && s.device !== 'unknown' ? `<span class="device-tag">${escapeHtml(deviceShort(s.device))}</span>` : '';
            // 状态标签
            let statusTag = '';
            if (isBurned) {
                statusTag = '<span class="burned-tag">' + i18nT('list.status_burned', '🔥 已焚') + '</span>';
            } else if (isExpired) {
                statusTag = '<span class="expired-tag">' + i18nT('list.status_expired', '已过期') + '</span>';
            } else if (isBurnAfterRead) {
                statusTag = `<span class="burned-tag" style="background: linear-gradient(135deg, rgba(255,165,0,0.3), rgba(255,200,0,0.3));">${i18nT('list.burn_short', '🔥 阅后即焚 · ')}<span class="list-countdown" data-expires="${s.expires_at}">${i18nT('list.remain_short', '剩 ')}${formatTime(s.expires_at - now)}</span></span>`;
            } else {
                statusTag = `<span class="list-countdown" data-expires="${s.expires_at}">${i18nT('list.remain_short', '剩 ')}${formatTime(s.expires_at - now)}</span>`;
            }
            // 按钮逻辑：
            //  - 普通 / URL active：📋 复制内容 + 🔗 直接打开（URL） + 👁 查看内容
            //  - 阅后即焚：只有 👁 查看内容 🔥（不显示复制 / 跳转，防绕过）
            //  - 已焚 / 过期：🔒 已失效
            const isPendingBurnOnly = isBurnAfterRead;  // 阅后即焚未焚
            const canCopy = !isExpired && !isBurned && !isPendingBurnOnly && s.type !== 'file';
            const canView = !isExpired && !isBurned;
            const copyBtn = canCopy ? `<button class="btn-copy" data-copy="${escapeHtml(copyContent)}" title="${i18nT('list.copy_content', '📋 复制内容')}">${i18nT('list.copy_content', '📋 复制内容')}</button>` : '';
            const isUrl = s.type === 'url' && !isExpired && !isBurned && !isPendingBurnOnly;
            const jumpBtn = isUrl ? `<a class="btn-jump" href="${escapeHtml(s.content)}" target="_blank" rel="noopener" title="${i18nT('list.open_url', '🔗 直接打开')}">${i18nT('list.open_url', '🔗 直接打开')}</a>` : '';
            const goBtn = canView ? `<button class="btn-go" data-go="${url}" title="${i18nT('list.view_content', '查看内容')}">${i18nT(isBurnAfterRead ? 'list.view_burn' : 'list.view_content', '👁 查看内容')}</button>` : `<button class="btn-disabled" disabled title="${i18nT('list.disabled', '🔒 已失效')}">${i18nT('list.disabled', '🔒 已失效')}</button>`;
            // 预览样式
            const previewClass = isFullMask ? 'masked' : (isPartial ? 'partial-shown' : '');
            const previewSpan = previewClass ? `<span class="${previewClass}">${escapeHtml(preview)}</span>` : escapeHtml(preview);
            return `
                <div class="list-item ${isExpired || isBurned ? 'locked' : ''} ${isExpired ? 'expired' : ''} ${isBurned ? 'burned' : ''} ${isBurnAfterRead ? 'pending-burn' : ''}" style="animation-delay: ${i * 0.05}s">
                    <div class="list-item-info">
                        <div class="list-item-title">${icon} ${previewSpan} ${devTag}</div>
                        <div class="list-item-meta">
                            <span>${i18nT('list.created_prefix', '📅 发布于 ')}${dateStr}</span>
                            ${statusTag}
                        </div>
                        ${(viewedInfo || burnedInfo) ? `<div class="list-item-submeta">${viewedInfo}${burnedInfo}</div>` : ''}
                    </div>
                    <div class="list-item-actions">
                        ${copyBtn}
                        ${jumpBtn}
                        ${goBtn}
                    </div>
                </div>
            `;
        }).join('');
        container.innerHTML = html;
        // 绑定复制按钮
        container.querySelectorAll('.btn-copy').forEach(btn => {
            btn.onclick = () => copyToClipboard(btn.getAttribute('data-copy'));
        });
        // 绑定查看按钮（本页面跳转，不打开新窗口）
        container.querySelectorAll('.btn-go').forEach(btn => {
            btn.onclick = () => {
                const url = btn.getAttribute('data-go');
                if (url) window.location.href = url;
            };
        });
        // 更新浮窗 badge
        updateFabCount(data.length);
    } catch (e) {
        const container = document.getElementById('shares-list');
        if (container) {
            container.innerHTML = '<p style="color:#ff8080; text-align:center; padding:20px; font-size:0.9em;">' + i18nT('sidebar.load_error', '加载失败: ') + escapeHtml(e.message) + '</p>';
        }
        console.error('loadShares error:', e);
    }
}

function updateFabCount(n) {
    const el = document.getElementById('fab-count');
    if (el) el.textContent = n;
}

// === Stats - 底部存储条 ===
async function loadStats() {
    try {
        const resp = await fetch('/api/stats');
        const data = await resp.json();
        const usedMB = data.storage_used_mb || 0;
        const limitMB = 5 * 1024;
        const percent = Math.min(100, (usedMB / limitMB) * 100);
        const usedEl = document.getElementById('storage-used');
        const percentEl = document.getElementById('storage-percent');
        const fillEl = document.getElementById('storage-fill');
        if (usedEl) usedEl.textContent = usedMB.toFixed(1) + ' MB';
        if (percentEl) percentEl.textContent = percent.toFixed(2) + '%';
        if (fillEl) fillEl.style.width = percent + '%';
        if (data.storage_used >= data.storage_limit) {
            document.querySelectorAll('.btn').forEach(b => b.disabled = true);
            toast(i18nT('toast.storage_full', '存储已满'), 'error');
        }
    } catch (e) {
        console.error('loadStats error:', e);
    }
}

// === i18n 启动 ===
// 先应用 i18n，再启动其他加载（保证所有静态文本先翻译）
(function initI18n() {
    const lang = window.i18nInit();
    window.i18nApply(lang);
    // 语言切换器
    const sel = document.getElementById('lang-switcher');
    if (sel) {
        sel.value = lang;
        sel.addEventListener('change', (e) => window.i18nSetLang(e.target.value));
    }
    // 语言切换后，触发列表/统计刷新（重新渲染动态内容）
    document.addEventListener('vshare:langchange', () => {
        try { loadShares(); } catch(e) {}
        try { loadStats(); } catch(e) {}
    });
})();

// === 启动 ===
loadShares();
loadStats();
loadVersion();

// 关闭侧边栏 X 已移除

// 加载版本信息
async function loadVersion() {
    try {
        const resp = await fetch('/api/version');
        const data = await resp.json();
        const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
        set('app-version', data.version);
        set('app-released', data.released);
        set('app-changelog', data.changelog);
        set('app-name', data.name);
    } catch (e) {}
}

setInterval(() => {
    updateCountdowns();
    loadShares();
    loadStats();
}, 5000);  // 5秒刷新（剩 10 分钟内的秒数会动态）

// === 页面返回/恢复时立即刷新 ===
// 场景：用户点开阅后即焚分享页 → 返回 → 这里要立即重新拉 list
window.addEventListener('pageshow', (event) => {
    // 浏览器 back/forward 缓存恢复时
    if (event.persisted) {
        loadShares();
        loadStats();
    } else {
        loadShares();
        loadStats();
    }
});
// 页面从隐藏变可见时（用户切回标签页）
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
        loadShares();
        loadStats();
    }
});
// 浏览器返回（popstate）也触发
window.addEventListener('popstate', () => {
    loadShares();
    loadStats();
});
</script>
